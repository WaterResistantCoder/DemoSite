<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Redirecting…</title>
<style>
  body{margin:0;background:#03040a;color:#f4f6ff;font-family:system-ui,Segoe UI,Roboto,sans-serif;
       display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center;}
  .box{padding:40px 20px;max-width:440px;}
  .box p{line-height:1.6;color:#9aa3c7;}
  a{color:#5fe9ff;text-decoration:none;}
  a:hover{text-decoration:underline;}
  h1{font-size:1.3rem;margin:0 0 10px;font-weight:700;color:#f4f6ff;letter-spacing:.5px;}
</style>
</head>
<body>
<div class="box">
  <h1 id="t">Redirecting…</h1>
  <p id="m">Taking you to the right place.</p>
  <p><a href="/">Go to atomicsoft.in</a></p>
</div>
<script>
// GitHub Pages serves this file for any unknown path (the URL in the address
// bar is preserved). Use it to make /SpellSpunThreads case-insensitive: any
// casing the visitor types resolves to the canonical folder.
(function () {
  var first = location.pathname.replace(/^\/+|\/+$/g, '').split('/')[0].toLowerCase();
  if (first === 'spellspunthreads') {
    location.replace('/SpellSpunThreads/');
    return;
  }
  // Any other unknown path → back to the main site (it's a single-page app).
  var t = document.getElementById('t'), m = document.getElementById('m');
  t.textContent = '404';
  m.textContent = 'That page drifted off into space. Sending you home…';
  setTimeout(function () { location.replace('/'); }, 1200);
})();
</script>
</body>
</html>
